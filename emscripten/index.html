<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="pdcurses.css" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-color: rgba(0, 0, 0, 1.0);
        --font-family: monospace;
        --font-size: 16;
      }

      body {
        background-color: var(--bg-color);
      }

      button {
        background-color: blue;
        border: none;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        outline: none;
        padding: 0.5em 1em;
        margin: 0.5em;

        &:hover,
        &:focus {
          background-color: darkblue;
          outline: solid 2px white;
        }

        html {
          height: 100%;
          width: 100%;
        }
      }
    </style>
    <script src="pdcurses.js"></script>
    <script>
      function loadScript(scriptName) {
        const promise = new Promise((resolve, reject) => {
          function cleanup() {
            clearTimeout(timeoutId);
            script.onload = null;
            script.onerror = null;
          }

          const script = document.createElement("script");
          script.src = scriptName;

          script.onload = () => {
            cleanup();
            resolve();
          };

          script.onerror = () => {
            cleanup();
            script.remove();
            reject(new Error(`Failed to load script: ${scriptName}`));
          };

          const timeoutId = setTimeout(() => {
            cleanup();
            script.remove();
            reject(new Error(`Timed out loading script ${scriptName}`));
          }, 5000);

          document.head.append(script);
        });

        return promise;
      }

      let modules = new Map();

      window.addEventListener("click", async (event) => {
        if (event.target instanceof HTMLButtonElement) {
          const scriptName = event.target.getAttribute("data-script");
          if (!modules.has(scriptName)) {
            try {
              await loadScript(scriptName);

              modules.set(scriptName, Module);
            } catch (error) {
              console.error(error);
              return;
            }
          }

          modules.get(scriptName)();
        }
      });
    </script>
  </head>

  <body>
    <main>
      <button data-script="firework.js">firework</button>
      <button data-script="ozdemo.js">ozdemo</button>
      <button data-script="rain.js">rain</button>
      <button data-script="stress.js">stress</button>
      <button data-script="testcurs.js">testcurs</button>
      <button data-script="test_mouse.js">test_mouse</button>
      <button data-script="worm.js">worm</button>
      <button data-script="xmas.js">xmas</button>
    </main>
  </body>

</html>
